name: Signal Monitor

on:
  schedule:
    # Every 30 min, 13:00–21:30 UTC, Mon–Fri (~9:00 AM–5:30 PM ET during EDT).
    # Note: GitHub cron is UTC and does NOT adjust for daylight saving —
    # during EST (winter) this window shifts one hour earlier in NY terms.
    # Gold futures trade nearly 24/5; widen the hours if you want overnight coverage.
    - cron: "7,37 13-21 * * 1-5"
  workflow_dispatch: {}   # manual "Run workflow" button for testing

permissions:
  contents: write   # needed to commit signal_state.json back

concurrency:
  group: signal-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet yfinance pandas numpy requests

      - name: Run signal monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Persist signal state
        run: |
          git config user.name "signal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add signal_state.json
          git diff --cached --quiet || (git commit -m "chore: update signal state [skip ci]" && git push)
